version: 2

models:
  - name: int_customer_revenue_summary
    description: >
      Aggregates order history to the customer level. 
      Provides key business metrics like Lifetime Value (LTV) and Recency.
    columns:
      - name: customer_id
        description: "The unique identifier for the customer."
        tests:
          - unique
          - not_null

      - name: total_lifetime_revenue
        description: "Total revenue generated by the customer across all orders."
        tests:
          - dbt_utils.accepted_range:
              min_value: 0

      - name: days_since_last_purchase
        description: "The number of days between the current date and the customer's last order."

      - name: avg_order_value
        description: "The average value of all orders placed by this customer."