version: 2

models:
  - name: stg_orders
    description: "Cleaned and deduplicated order data from the raw sales system."
    columns:
      - name: order_pk
        description: "Hashed surrogate key for the order, generated from order_id and order_date."
        tests:
          - unique
          - not_null
          
      - name: order_id
        description: "The primary key for each order, deduplicated by the most recent order date."
        tests:
          - unique
          - not_null

      - name: order_status
        tests:
          - accepted_values:
              arguments: 
                values: ['Completed', 'Cancelled', 'Returned']

      - name: customer_id
        description: "The unique identifier for a customer; defaults to 'CUST501' if missing or null."

      - name: product_id
        description: "The unique identifier for a product; defaults to 'PROD201' if missing or null."

      - name: unit_price
        description: "The unit price for a product. Defaults to 20 if the raw value is 0 or less."

      - name: quantity
        description: "The order quantity. Defaults to 1 if the raw value is 0 or less."